
<div class="row">
    <h2>Информация о пользователе.</h2>
    <div class="col-md-12" id="profile-form" role="form">
        <div class="card">
            <div class="card-header">
                <h4>Заполните форму.</h4></div>
            <div class="card-body">
                <div class="alert alert-info" ng-show="updated">
                    {{ message }}
                </div>
                <div class="col-sm">
                    <div class="form-group">
                        <img alt="User Pic" ng-src="{{photo.imgUrl}}" id="profile-image1" class="img-circle img-responsive" style="width: 200px">
                    </div>
                </div>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="link" ng-model="link"
                           placeholder="https://bryansk.hh.ru/resume/456e45a1ff052c69300039ed1f4e6b74326b73"
                           aria-label="Recipient's username" aria-describedby="basic-addon2">
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button" ng-click="load(link)">Загрузить</button>
                    </div>
                </div>
                <div class="form-group">
                    <span>Фото: (Размер не более  1мб. формат jpg)</span>
                    <label for="file" class="file_upload">
                        <span class="button">Выбрать</span>
                        <mark>Файл не выбран</mark>
                        <input type="file" id="file" file-model="file">
                    </label>
                </div>

                <div class="form-group">
                    <label for="name">ФИО:</label>
                    <input type="text" class="form-control" id="name" ng-model="person.username"
                           data-minlength="6"
                           data-error="Заполните поле" required>
                    <div class="help-block with-errors"></div>
                </div>
                <div class="form-group">
                    <label for="location">Место нахождения:</label>
                    <input type="text" class="form-control" id="location" ng-model="person.location"
                           data-minlength="6"
                           data-error="Заполните поле" required>
                    <div class="help-block with-errors"></div>
                </div>
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="showProfile" ng-model="person.show">
                    <label for="showProfile">Показывать резюме:</label>
                </div>
                <div class="form-group">
                    <label for="experience">Опыт работы: (если нет введите: начало карьеры)</label>
                    <input type="text" class="form-control" id="experience" ng-model="person.experience"
                           data-minlength="1"
                           data-error="Заполните поле" required>
                    <div class="help-block with-errors"></div>
                </div>
                <div class="form-group">
                    <label for="about_me_min">Титул (Например: Senior Java Developer, Spring/Angular Java Dev): </label>
                    <textarea class="form-control" id="about_me_min" ng-model="person.aboutShort"
                              data-minlength="10"
                              data-error="Заполните поле" required></textarea>
                    <div class="help-block with-errors"></div>
                </div>
                <div class="form-group">
                    <label for="about">О себе:</label>
                    <textarea class="form-control" id="about" rows="10" ng-model="person.about"
                              data-minlength="10"
                              data-error="Заполните поле" required></textarea>
                    <div class="help-block with-errors"></div>
                </div>
                <div class="form-group">
                    <label for="salary">Желаемая зарплата:</label>
                    <input type="text" class="form-control" id="salary" ng-model="person.salary">
                    <div class="help-block with-errors"></div>
                </div>
                <a href="#" class="btn btn-default" onclick="document.location.href = CONTEXT + 'settings/settings.html';">
                    Назад
                </a>
                <button class="btn btn-default pull-right" ng-click="save(person)">Сохранить</button>
            </div>
        </div>
    </div>
</div>
