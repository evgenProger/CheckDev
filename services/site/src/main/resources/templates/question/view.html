<div class="row" ng-show="isAdmin">
    <div class="col-md-12 float-right">
        <a ng-href="#/exam/view/{{question.exam.id}}" class="btn btn-secondary">К тесту</a>
        <a ng-href="#/question/{{question.id}}/option/update" class="btn btn-secondary">Добавить вариант</a>
        <a ng-href="#/exam/{{question.exam.id}}/question/update/{{question.id}}" class="btn btn-secondary">Отредактировать</a>
        <button type="button" class="btn btn-secondary float-right" ng-click="delete(exam)">Удалить</button>
    </div>
</div>
<div class="row" style="padding-top: 10px;">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                {{question.name}}
            </div>
            <div class="card-body">
                <div data-ng-bind-html="description"></div>
                <table class="table">
                    <thead>
                    <tr>
                        <th>Вариант</th>
                        <th>Корректность</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr ng-repeat="option in options" ng-hide="option.deleted">
                        <td> {{ option.pos }}. {{ option.description }}</td>
                        <td> {{ option.correct }}</td>
                        <td>
                            <a ng-href="#/question/{{question.id}}/option/update/{{option.id}}" class="btn btn-link">
                                <span class="glyphicon glyphicon-pencil"></span>
                            </a>
                            <button class="btn btn-link" ng-click="deleteOpt(option)">
                                <span class="glyphicon glyphicon-trash"></span>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                Рекомендации
            </div>
            <div class="card-body">
                <div data-ng-bind-html="hint"></div>
            </div>
        </div>
    </div>
</div>
