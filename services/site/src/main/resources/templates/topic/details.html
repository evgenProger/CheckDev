<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="/img/icons/svg/check-double-solid.svg">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta name="description" content="CheckDev - пробные собеседования в IT.">
    <title>topic/{topicId}</title>

    <!-- Required meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700,400i,900|Open+Sans:300,400,600,700,800&amp;subset=cyrillic"
          rel="stylesheet">
    <!-- Bootstrap 5.1.3 CSS -->
    <link th:href="@{/css_bootstrap_5_3_2/bootstrap.min.css}" rel="stylesheet">
    <script th:href="@{/js_bootstrap_5_3_2/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/popper.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/bootstrap.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/code.jquery.com_jquery-3.7.0.min.js}"></script>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div>
        <div class="cell">
            <span th:if="${userInfo != null}">
                <a th:href="@{|/interview/createForm?topicId=${topic.id}|}" class="btn btn-success mb-2"
                   role="button" aria-pressed="true">
                    Создать собеседование
                </a>
            </span>
            <span th:if="${userInfo == null}">
                <a th:href="@{|/login?redirectUri=/interview/createForm&topicId=${topic.id}|}" class="btn btn-success mb-2"
                   role="button" aria-pressed="true">
                    Создать собеседование
                </a>
            </span>
        </div>
    </div>
    <div class="card">
        <div class="card-header">
            <span class="fw-bold" th:text="${topic.name}"></span>
            <span class="mr-3">Позиция : </span>
            <span class="fw-bold" th:text="${topic.position}"></span>
        </div>
        <div class="card-body">
            <pre th:text="${topic.text}"></pre>
        </div>
    </div>
</div>
<br>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
