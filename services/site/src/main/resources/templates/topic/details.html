<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="/img/icons/svg/check-double-solid_dark.svg">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta name="description" content="CheckDev - пробные собеседования в IT.">
    <title>topic/{topicId}</title>

    <!-- Required meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700,400i,900|Open+Sans:300,400,600,700,800&amp;subset=cyrillic"
          rel="stylesheet">
    <!-- Bootstrap 5.1.3 CSS -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <script th:href="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/webjars/popper.js/2.11.7/umd/popper.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.min.js}"></script>
    <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div>
        <div class="cell">
            <span th:if="${userInfo != null}">
                <a th:href="@{|/interview/createForm?topicId=${topic.id}|}" class="btn btn-success mb-2"
                   role="button" aria-pressed="true">
                    Создать собеседование
                </a>
            </span>
            <span th:if="${userInfo == null}">
                <a th:href="@{|/login?redirectUri=/interview/createForm&topicId=${topic.id}|}" class="btn btn-success mb-2"
                   role="button" aria-pressed="true">
                    Создать собеседование
                </a>
            </span>
        </div>
            <div class="cell">
                <div th:if="${userInfo != null}">
                    <a class="nav-item nav-link" th:if="${!userTopicDTO.subscribeTopicIds.contains(topic.id)}">
                        <form th:action="@{/notification/subscribeTopicFromDetails}"  method="POST">
                            <div class="form-group">
                                <input type="hidden" name="id" th:value="${userInfo.id}"/>
                                <input type="hidden" name="topicId" th:value="${topic.id}" />
                            </div>
                            <button type="submit" class="btn btn-primary">Подписаться</button>
                        </form>
                    </a>
                    <a class="nav-item nav-link" th:if="${userTopicDTO.subscribeTopicIds.contains(topic.id)}">
                        <form th:action="@{/notification/unSubscribeTopicFromDetails}"  method="POST">
                            <div class="form-group">
                                <input type="hidden" name="id" th:value="${userInfo.id}"/>
                                <input type="hidden" name="topicId" th:value="${topic.id}" />
                            </div>
                            <button type="submit" class="btn btn-primary">Отписаться</button>
                        </form>
                    </a>
                </div>
                <p></p>
            </div>
    </div>
    <div class="card">
        <div class="card-header">
            <span class="fw-bold" th:text="${topic.name}"></span>
            <span th:if="${canManage}">
                <span class="mr-3">Позиция : </span>
                <span class="fw-bold" th:text="${topic.position}"></span>
            </span>
        </div>
        <div class="card-body">
            <pre th:utext="${topic.text}"></pre>
        </div>
    </div>
</div>
<br>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
