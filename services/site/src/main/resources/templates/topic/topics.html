<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <!-- favicon -->
    <link href="/img/icons/svg/check-double-solid.svg" rel="icon" type="image/svg+xml">

    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta content="CheckDev - пробные собеседования в IT." name="description">
    <title>categories</title>

    <!-- Required meta tags -->
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link crossorigin="anonymous" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
          integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" rel="stylesheet">
    <!-- Bootstrap 5.3.2 CSS -->
    <link rel="stylesheet" th:href="@{/css_bootstrap_5_3_2/bootstrap.min.css}">
    <script th:href="@{/js_bootstrap_5_3_2/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/popper.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/bootstrap.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/code.jquery.com_jquery-3.7.0.min.js}"></script>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div class="row" th:if="${userInfo != null}">
        <div class="cell">
            <a aria-pressed="true" class="btn mb-2"
               role="button"
               style="background-color: lavender; border-color: lavender;" th:href="@{/topic/createForm/{id}(id=${categoryId})}">
                Создать тему
            </a>
        </div>
    </div>
    <div class="row">
        <table class="table table-hover">
            <tbody>
            <tr th:each="topic: ${topics}">
                <td>
                    <div>
						    <span>
                                <a class="text-decoration-none text-dark h5"
                                   th:href="@{|/topic/${topic.id}|}"
                                   th:text="${topic.name}">
                                </a>
                            </span>
                        <span th:if="${canManage}">
                                <a class="text-decoration-none text-dark"
                                   th:href="@{|/topic/updateForm/${topic.id}|}">
                                    <i class="fas fa-pencil-alt pl-3"></i>
                                </a>
                            </span>
                    </div>
                    <div>
                        <small class="mb-2 text-muted">
                            <span><i class="fas fa-eye pr-3"></i> : </span>
                            <span class="fw-bold" th:text="${topic.total}"></span> |
                        </small>
                        <small class="mb-2 text-muted">
                            <span> Позиция : </span>
                            <span class="fw-bold" th:text="${topic.position}"></span>
                        </small>
                    </div>
                </td>
                <td>
                    <div>
                        <span>Новых: 1</span> |
                        <span>Проведено: 100500</span>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<br>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
