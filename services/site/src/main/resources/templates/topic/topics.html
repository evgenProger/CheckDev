<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="/img/icons/svg/check-double-solid.svg">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta name="description" content="Обучение и трудоустройство Java-программистов от Junior до Senior">
    <meta name="author" content="Job4j.ru">
    <title>Check Dev</title>

    <!-- Required meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700,400i,900|Open+Sans:300,400,600,700,800&amp;subset=cyrillic"
          rel="stylesheet">
    <!-- Bootstrap 5.1.3 CSS -->
    <link th:href="@{/css_bootstrap_5_3_2/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
          integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <script th:href="@{/js_bootstrap_5_3_2/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/popper.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/bootstrap.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/code.jquery.com_jquery-3.7.0.min.js}"></script>

</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div class="row pt-3">
        <div class="col-md-12 pull-right">
            <a th:if="${canManage}"
               th:href="@{/topic/createForm/{id}(id=${categoryId})}" class="btn btn-secondary
				active mb-2" role="button" aria-pressed="true">
                Создать тему
            </a>
        </div>
    </div>
    <div class="row pt-3">
        <div class="cell>">
            <table class="table table-hover">
                <tbody>
                <tr th:each="topic: ${topics}">
                    <td>
                        <a class="fw-bold text-dark text-decoration-none"
                           th:href="@{|/topic/${categoryName}/${categoryId}/${topic.id}|}">
                            <h3 th:text="${topic.name}"></h3>
                        </a>
                        <small class="mb-2 text-muted">
                            <span><i class="fas fa-eye pr-3"></i> : </span>
                            <span class="fw-bold" th:text="${topic.total}"></span>
                        </small>
                        <div th:if="${canManage}">
                            <form class="mt-3"
                                  th:action="@{|/topic/updateForm/${categoryName}/${categoryId}/${topic.id}|}"
                                  method="get">
                                <label>
                                    <input name="id" type="number"
                                           th:value="${topic.id}" hidden="hidden">
                                </label>
                                <button class="btn btn-primary btn-sm"
                                        type="submit">обновить
                                </button>
                            </form>
                            <form class="mt-3"
                                  th:action="@{/topic/delete}" method="post">
                                <label>
                                    <input name="id" type="number"
                                           th:value="${topic.id}" hidden="hidden">
                                </label>
                                <button class="btn btn-danger btn-sm"
                                        type="submit">удалить
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<br>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
