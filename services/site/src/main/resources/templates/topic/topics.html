<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link href="../../static/img/favorite.png" rel="icon" type="image/png">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta content="Обучение и трудоустройство Java-программистов от Junior до Senior" name="description">
    <meta content="Job4j.ru" name="author">
    <title>Check Dev</title>

    <!-- Required meta tags -->
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700,400i,900|Open+Sans:300,400,600,700,800&amp;subset=cyrillic"
          rel="stylesheet">
    <!-- Bootstrap 5.1.3 CSS -->
    <link rel="stylesheet" th:href="@{/css_bootstrap_5_3_2/bootstrap.min.css}">
    <script th:href="@{/js_bootstrap_5_3_2/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/popper.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/bootstrap.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/code.jquery.com_jquery-3.7.0.min.js}"></script>

</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div class="row pt-3">
        <div class="col-md-12 pull-right">
            <a aria-pressed="true"
               class="btn btn-secondary
				active mb-2" role="button" th:href="@{/topic/createForm/{id}(id=${categoryId})}" th:if="${canManage}">
                Создать тему
            </a>
        </div>
    </div>
    <div class="row pt-3">
        <div class="cell>">
            <table class="table table-hover">
                <tbody>
                <tr th:each="topic: ${topics}">
                    <td>
                        <a class="fw-bold text-dark text-decoration-none"
                           th:href="@{|/topic/${categoryName}/${categoryId}/${topic.id}|}">
                            <h3 th:text="${topic.name}"></h3>
                        </a>
                        <div th:if="${canManage}">
                            <form class="mt-3"
                                  method="get"
                                  th:action="@{|/topic/updateForm/${categoryName}/${categoryId}|}">
                                <label>
                                    <input hidden="hidden" name="id"
                                           th:value="${topic.id}" type="number">
                                </label>
                                <button class="btn btn-primary btn-sm"
                                        type="submit">обновить
                                </button>
                            </form>
                            <form class="mt-3"
                                  method="post" th:action="@{/topic/delete}">
                                <label>
                                    <input hidden="hidden" name="id"
                                           th:value="${topic.id}" type="number">
                                </label>
                                <button class="btn btn-danger btn-sm"
                                        type="submit">удалить
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<br>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
