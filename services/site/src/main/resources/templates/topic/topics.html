<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" type="image/png" href="../../static/img/favorite.png">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
	<meta name="description" content="Обучение и трудоустройство Java-программистов от Junior до Senior">
	<meta name="author" content="Job4j.ru">
	<title>Check Dev</title>

	<!-- Required meta tags -->
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700,400i,900|Open+Sans:300,400,600,700,800&amp;subset=cyrillic"
	      rel="stylesheet">
	<!-- Bootstrap 5.1.3 CSS -->
	<link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
	<link th:href="@{/css/main.min.css}" rel="stylesheet">
	<script th:src="@{/js/bootstrap.min.js}"></script>
	<script th:src="@{/js/code.jquery.com_jquery-3.7.0.min.js}"></script>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
	<div class="row pt-2" th:if="${canManage}">
		<div class="col-md-12 pull-right">
			<a th:href="@{/topic/createForm/{id}(id=${categoryId})}" class="btn btn-secondary
				active" role="button" aria-pressed="true">
				Создать тему
			</a>
		</div>
	</div>
	<div class="row">
		<table class="table table-hover">
			<thead>
			<tr>
				<th scope="col">Темы</th>
			</tr>
			</thead>
			<tbody>
			<tr th:each="topic: ${topics}">
				<td>
					<h3 th:text="${topic.name}"/>
					<p th:text="${topic.text}"/>
					<div th:if="${canManage}">
						<form class="mt-3" th:action="@{/topic/updateForm}" method="get">
							<label>
								<input name="id" type="number" th:value="${topic.id}" hidden="hidden">
							</label>
							<button class="btn btn-primary btn-sm" type="submit">обновить</button>
						</form>
						<form class="mt-3" th:action="@{/topic/delete}" method="post">
							<label>
								<input name="id" type="number" th:value="${topic.id}" hidden="hidden">
							</label>
							<button class="btn btn-danger btn-sm" type="submit">удалить</button>
						</form>
					</div>
				</td>
			</tr>
			</tbody>
		</table>
	</div>
</div>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
