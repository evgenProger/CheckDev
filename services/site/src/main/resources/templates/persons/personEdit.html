<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../../static/img/favorite.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta name="description" content="Обучение и трудоустройство Java-программистов от Junior до Senior">
    <meta name="author" content="Job4j.ru">
    <title>Обучение и трудоустройство Java-программистов от Junior до Senior</title>

    <!-- Required meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700,400i,900|Open+Sans:300,400,600,700,800&amp;subset=cyrillic"
          rel="stylesheet">
    <!-- Bootstrap 5.3.2 CSS -->
    <link th:href="@{/css_bootstrap_5_3_2/bootstrap.min.css}" rel="stylesheet">
    <script th:href="@{/js_bootstrap_5_3_2/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/popper.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/bootstrap.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/code.jquery.com_jquery-3.7.0.min.js}"></script>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div class="row pt-3">
        <div class="card" style="width: 100%">
            <div class="card-header">
                Редактирование пользователя
            </div>
            <div class="card-body">
                <form th:action="@{/persons/edit}" method="POST" th:object="${personDto}" enctype="multipart/form-data">
                    <input type="hidden" name="id" th:field="*{id}">
                    <input type="hidden" name="photo" th:field="*{photo.id}">
                    <div class="row mb-3">
                        <div class="col-3">
                            <!--Photo view-->
                            <div class="mb-3">
                                <img th:if="${not #lists.isEmpty(photo)}"
                                     th:src="@{'data:image/jpeg;base64,'+ ${photo}}" class="w-100"
                                     alt="No image">
                            </div>
                            <!--Photo load-->
                            <div class="mb-3">
                                <input class="form-control form-control-sm w-100" type="file" id="formFile" name="file">
                            </div>
                        </div>
                        <div class="col-9">
                            <!--Username-->
                            <div class="mb-3">
                                <label for="username" class="form-label"><b>ФИО</b></label>
                                <input type="text" class="form-control" id="username" name="username"
                                       th:field="*{username}"
                                       placeholder="ФИО">
                            </div>
                            <!--Email-->
                            <div class="mb-3">
                                <label for="email" class="form-label"><b>Email</b></label>
                                <input type="email" class="form-control" id="email" name="username" th:field="*{email}"
                                       placeholder="Email">
                            </div>
                            <!--Experience-->
                            <div class="mb-3">
                                <label for="experience" class="form-label"><b>Опыт</b></label>
                                <textarea class="form-control"
                                          rows="5"
                                          id="experience" name="experience" th:field="*{experience}"
                                          placeholder="Опыт"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="salary" class="form-label"><b>Ожидаемый доход</b></label>
                                <input type="text" class="form-control" id="salary" name="salary" th:field="*{salary}">
                            </div>
                            <div class="mb-3">
                                <label for="location"><b>Город</b></label>
                                <input type="text" class="form-control" id="location" name="location"
                                       th:field="*{location}" placeholder="Город">
                            </div>
                        </div>
                    </div>
                    <!--Отмена-->
                    <a class="btn btn-secondary mt-3"
                       th:href="@{/}">Отмена</a>
                    <!--Обновить инцидент-->
                    <button class="btn btn-success mt-3" type="submit">Обновить</button>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
