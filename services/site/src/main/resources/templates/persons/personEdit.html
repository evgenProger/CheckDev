<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link href="../../static/img/favorite.png" rel="icon" type="image/png">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta content="Обучение и трудоустройство Java-программистов от Junior до Senior" name="description">
    <meta content="Job4j.ru" name="author">
    <title>Обучение и трудоустройство Java-программистов от Junior до Senior</title>

    <!-- Required meta tags -->
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700,400i,900|Open+Sans:300,400,600,700,800&amp;subset=cyrillic"
          rel="stylesheet">
    <!-- Bootstrap 5.3.2 CSS -->
    <link rel="stylesheet" th:href="@{/css_bootstrap_5_3_2/bootstrap.min.css}">
    <script th:href="@{/js_bootstrap_5_3_2/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/popper.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/bootstrap.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/code.jquery.com_jquery-3.7.0.min.js}"></script>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div class="row pt-3">
        <div class="card" style="width: 100%">
            <div class="card-header">
                Редактирование пользователя
            </div>
            <div class="card-body">
                <form enctype="multipart/form-data" method="POST" th:action="@{/persons/edit}" th:object="${personDto}">
                    <input name="id" th:field="*{id}" type="hidden">
                    <input name="photo" th:field="*{photo.id}" type="hidden">
                    <div class="row mb-3">
                        <div class="col-3">
                            <!--Photo view-->
                            <div class="mb-3">

                                <img th:if="${photoId>0}"
                                     th:src="@{/photo/{id}(id=${photoId})}" class="w-100"
                                     alt="No image">
                            </div>
                            <!--Photo load-->
                            <div class="mb-3">
                                <input class="form-control form-control-sm w-100" id="formFile" name="file" type="file">
                            </div>
                        </div>
                        <div class="col-9">
                            <!--Username-->
                            <div class="mb-3">
                                <label class="form-label" for="username"><b>ФИО</b></label>
                                <input class="form-control" id="username" name="username" placeholder="ФИО"
                                       th:field="*{username}"
                                       type="text">
                            </div>
                            <!--Email-->
                            <div class="mb-3">
                                <label class="form-label" for="email"><b>Email</b></label>
                                <input class="form-control" id="email" name="username" placeholder="Email" th:field="*{email}"
                                       type="email">
                            </div>
                            <!--Experience-->
                            <div class="mb-3">
                                <label class="form-label" for="experience"><b>Опыт</b></label>
                                <textarea class="form-control"
                                          id="experience"
                                          name="experience" placeholder="Опыт" rows="5"
                                          th:field="*{experience}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="salary"><b>Ожидаемый доход</b></label>
                                <input class="form-control" id="salary" name="salary" th:field="*{salary}" type="text">
                            </div>
                            <div class="mb-3">
                                <label for="location"><b>Город</b></label>
                                <input class="form-control" id="location" name="location" placeholder="Город"
                                       th:field="*{location}" type="text">
                            </div>
                        </div>
                    </div>
                    <!--Отмена-->
                    <a class="btn btn-secondary mt-3"
                       th:href="@{/}">Отмена</a>
                    <!--Обновить инцидент-->
                    <button class="btn btn-success mt-3" type="submit">Обновить</button>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
