<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link href="../../static/img/favorite.png" rel="icon" type="image/png">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta name="description" content="CheckDev - пробные собеседования в IT.">
    <title>persons/</title>

    <!-- Required meta tags -->
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link crossorigin="anonymous" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
          integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" rel="stylesheet">
    <!-- Bootstrap 5.3.2 CSS -->
    <link rel="stylesheet" th:href="@{/css_bootstrap_5_3_2/bootstrap.min.css}">
    <script th:href="@{/js_bootstrap_5_3_2/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/popper.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/bootstrap.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/code.jquery.com_jquery-3.7.0.min.js}"></script>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div class="row">
        <div class="card" style="width: 100%">
            <div class="card-header">
                Просмотр пользователя
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-3">
                        <div class="mb-3">

                            <i th:if="${photoId<0}"
                               class="fas fa-image" style="font-size: 3em;"></i>
                            <img th:if="${photoId>0}"
                                 th:src="@{/photo/{id}(id=${photoId})}" class="w-100"
                                 alt="No image">
                        </div>
                    </div>
                    <div class="col-9">
                        <div class="mb-3">
                            <h4>
                                <p th:text="'Имя: ' + ${personDto.username}">Имя пользователя</p>
                            </h4>
                        </div>
                        <div class="mb-3">
                            <p th:text="'Email: ' + ${personDto.email}">Email</p>
                        </div>
                        <div class="mb-3">
                            <p th:text="'Опыт: ' + ${personDto.experience}">Опыт</p>
                        </div>
                        <div class="mb-3">
                            <p th:text="'Ожидаемый доход: ' + ${personDto.salary}">Ожидаемый доход</p>
                        </div>
                        <div class="mb-3">
                            <p th:text="'Город: ' + ${personDto.location}">Город</p>
                        </div>
                    </div>
                </div>
                <!--Кнопка редактировать-->
                <a class="btn btn-success mt-3"
                   th:href="@{/persons/edit}">Редактировать</a>
            </div>
        </div>
    </div>
</div>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
