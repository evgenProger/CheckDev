<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="/img/icons/svg/check-double-solid_dark.svg">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta name="description" content="CheckDev - пробные собеседования в IT.">
    <title>index</title>

    <!-- Required meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
          integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <!-- Bootstrap 5.3.2 CSS -->
    <link th:href="@{/css_bootstrap_5_3_2/bootstrap.min.css}" rel="stylesheet">
    <script th:href="@{/js_bootstrap_5_3_2/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/popper.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/bootstrap.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/code.jquery.com_jquery-3.7.0.min.js}"></script>
</head>
<body>

<div th:insert="fragments/header :: header"></div>
<div th:if="${categories != null}">
    <div class="container">
        <div class="row">
            <div class="cell">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Популярные категории</th>
                    </tr>
                    </thead>
                    <tbody class="table-hover">

                    <tr th:each="category: ${categories}" style="cursor: pointer;">
                        <td>
                            <div>
                                <a class="fw-bold text-dark text-decoration-none"
                                   th:href="@{|/topics/${category.id}|}">
                                    <h5 th:text="${category.name}"></h5>
                                </a>
                            </div>
                            <small class="mb-2 text-muted">
                                <span><i class="fas fa-eye pr-3"></i> : </span>
                                <span class="fw-bold" th:text="${category.total}"></span>
                                <span class="mr-3">Тем : </span>
                                <span class="fw-bold" th:text="${category.topicsSize}"></span>
                                <span th:if="${canManage}" > |
                                <span class="mr-3">Позиция : </span>
                                <span class="fw-bold" th:text="${category.position}"></span>
                            </span>
                            </small>
                            <div th:if="${userInfo != null}">
                                <a class="nav-item nav-link" th:if="${!userDTO.subscribeCategoryIds.contains(category.id)}">
                                    <form th:action="@{/notification/subscribeCategoryFromIndex}"  method="POST">
                                        <div class="form-group">
                                            <input type="hidden" name="id" th:value="${userInfo.id}"/>
                                            <input type="hidden" name="categoryId" th:value="${category.id}" />
                                        </div>
                                        <button type="submit" class="btn btn-primary">Подписаться</button>
                                    </form>
                                </a>
                                <a class="nav-item nav-link" th:if="${userDTO.subscribeCategoryIds.contains(category.id)}">
                                    <form th:action="@{/notification/unSubscribeCategoryFromIndex}"  method="POST">
                                        <div class="form-group">
                                            <input type="hidden" name="id" th:value="${userInfo.id}"/>
                                            <input type="hidden" name="categoryId" th:value="${category.id}" />
                                        </div>
                                        <button type="submit" class="btn btn-primary">Отписаться</button>
                                    </form>
                                </a>
                            </div>
                        </td>
                        <td>
                            <div>
                                <span>Новых: 1</span> |
                                <span>Проведено: 100500</span>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div  class="container">
        <div class="row">
            <div class="cell">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Новые собеседования</th>
                    </tr>
                    </thead>
                    <tbody class="table-hover">
                    <tr th:each="interview: ${new_interviews}" style="cursor: pointer;">
                        <td>
                            <div>
                                <a class="fw-bold text-dark text-decoration-none"
                                   th:href="@{|/interview/${interview.id}|}">
                                    <h5 th:text="${interview.title}"></h5>
                                </a>
                            </div>
                            <div class="pb-2">
                                <a class="text-dark text-decoration-none"
                                   th:href="@{|/interview/${interview.id}|}"
                                   th:text="${'Ориентировочная дата: ' + interview.approximateDate}">
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
