<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="/img/icons/svg/check-double-solid.svg">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta name="description" content="Обучение и трудоустройство Java-программистов от Junior до Senior">
    <meta name="author" content="Job4j.ru">
    <title>Обучение и трудоустройство Java-программистов от Junior до Senior</title>

    <!-- Required meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
          integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <!-- Bootstrap 5.3.2 CSS -->
    <link th:href="@{/css_bootstrap_5_3_2/bootstrap.min.css}" rel="stylesheet">
    <script th:href="@{/js_bootstrap_5_3_2/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/popper.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/bootstrap.min.js}"></script>
    <script th:src="@{/js_bootstrap_5_3_2/code.jquery.com_jquery-3.7.0.min.js}"></script>
</head>
<body>

<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div class="row">
        <div class="cell">
            <h5>Популярные категории</h5>
            <table class="table">
                <tr th:each="category: ${categories}" style="cursor: pointer;">
                    <td>
                        <div>
                            <span class="fw-bold" th:text="${category.name}"></span>
                        </div>
                        <small class="mb-2 text-muted">
                            <span><a style="white-space: nowrap" th:href="@{|/category/statistic/${category.id}|}"><i class="fas fa-eye pr-3"></i></a> : </span>
                            <span class="fw-bold" th:text="${category.total}"></span> |
                            <span><a style="white-space: nowrap" th:href="@{|/topics/${category.id}|}">Тем</a>: </span>
                            <span class="fw-bold" th:text="${category.topicsSize}"></span>
                        </small>
                    </td>
                    <td>
                       <div>
                           <span>Новых: 1</span> |
                           <span>Проведено: 100500</span>
                       </div>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</div>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
