<div th:insert="fragments/header :: header"></div>
<div class="sec-1">
    <div class="shadow"></div>
    <div class="container" style="position:inherit;">
        <div class="row">
            <div class="col-xl-12 col-lg-12 col-md-12 search">
                <form class="search-form">
                    <div class="form-group flex">
                        <input type="text" class="form-control col-xl-12" id="inputSearch" placeholder="Я ищу..." ng-model="key">
                        <button type="submit" class="btn btn-primary col-xl-2" ng-click="search(key)">Найти</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="row">
            <div class="col-xl-8 col-lg-7 col-md-6 vacancies">
                <h2 class="title">
                    <span class="big">CheckDev –</span> пробные собеседования в IT
                </h2>
                <div class="row">
                    <div class="col-xl-12 col-lg-12 statistic-wrp">
                        <div class="statistic">
                            <div class="statistic__item"><span class="num">0</span> разделов</div>
                            <div class="statistic__item"><span class="num">0</span> собеседований</div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-xl-12 col-lg-12 controls-wrp">
                        <div class="controls">
                            <div class="controls__item">
                                <a href="#" onclick="return loadPage('index.html', '#/vacancy/update');"
                                   class="btn btn-watch yellow">Выбрать раздел</a>
                            </div>
                            <div class="controls__item">
                                <a href="#" class="btn btn-watch blue"
                                   onclick="return loadPage('settings/settings.html', '#/profile');">Пройти
                                    собеседование</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-lg-5 col-md-6 login-form" id="sign_form">
                <div class="form-wrapper">
                    <div class="col-sm"></div>
                    <div class="col-sm">
                        <div th:if="${not #lists.isEmpty(errorMessage)}" class="alert alert-danger" role="alert">
                            <span th:text="${errorMessage}"></span>
                        </div>
                        <form th:action="@{/signInIndex}" method="post">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" class="form-control" id="email"
                                       name="email"
                                       aria-describedby="emailHelp" placeholder="Введите email">
                            </div>
                            <div class="form-group pb-3">
                                <label for="password">Пароль</label>
                                <input type="password" class="form-control" id="password"
                                       name="password" placeholder="Password">
                            </div>
                            <div class="form-group">
                                <button type="submit" class="btn btn-primary">Войти</button>
                            </div>
                        </form>
                        <div id="register-form" class="reg">
                            <a th:href="@{https://t.me/checkdev_bot?start=true}">Регистрация через телеграм бота</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
