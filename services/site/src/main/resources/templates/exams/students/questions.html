<div class="row p-3" ng-hide="loaded">
    <div class="col-md-6">
        <div class="float-right">
            <i class="fa fa-cog fa-spin" style="font-size:70px"></i>
        </div>
    </div>
</div>

<div class="alert alert-danger" ng-show="error">
    <strong>Ошибка!</strong> Вы пытаетесь выполнить запрещенное или несуществующее действие.
</div>

<div class="row" ng-show="loaded">
    <div class="col-md-12">
        <div class="progress">
            <div aria-valuemax="100" aria-valuemin="0" aria-valuenow="50"
                 class="progress-bar progress-bar-info" role="progressbar" style="width:{{percent}}%">
                {{ current }}/{{ total }}
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                {{ current }}. {{html(question.name)}}
            </div>
            <div class="card-body">
                <div data-ng-bind-html="html(question.description)"></div>
                <div class="checkbox" ng-repeat="(key, option) in options">
                    <label>
                        <input ng-change="change()" ng-checked="aopts[key]" ng-false-value=""
                               ng-model="answers[key]" ng-true-value="{{option.id}}" type="checkbox">
                        {{option.description}}
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row pt-3 pb-3" ng-show="loaded">
    <div class="col-md-12 center-block">
        <button class="btn btn-default" ng-click="back()" ng-hide="start">Назад</button>
        <button class="btn btn-success pull-right" ng-click="next()" ng-disabled="!choose" ng-show="finish">Завершить
        </button>
        <button class="btn btn-success pull-right" ng-click="next()" ng-disabled="!choose" ng-hide="finish">Далее
        </button>
    </div>
</div>
