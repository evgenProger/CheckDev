<div class="row p-3" ng-hide="loaded">
    <div class="col-md-6">
        <div class="float-right">
            <i class="fa fa-cog fa-spin" style="font-size:70px"></i>
        </div>
    </div>
</div>

<div class="alert alert-danger" ng-show="error">
    <strong>Ошибка!</strong> Вы пытаетесь выполнить запрещенное или несуществующее действие.
</div>

<div class="row" ng-show="loaded">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                {{result.exam.name}}
            </div>
            <div class="card-body">
                <div>Ваш результат : {{result.result}}%</div>
                <div>Дата сдачи : {{result.finish | date: 'dd.MM.yyyy'}}</div>
                <div>Попыток : {{result.total}}</div>
            </div>
        </div>
    </div>
</div>

<div class="row" ng-show="loaded">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                Рекомендации
            </div>
            <div class="card-body">
                <ul class="list-group">
                    <li class="list-group-item" ng-repeat="hint in hints track by $index">
                        {{ $index + 1 }}. <span data-ng-bind-html="html(hint.question)"></span><br/><br/>
                        <div data-ng-bind-html="html(hint.hint)"></div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-12 pull-right">
        <a class="btn btn-default" ng-href="#/load">Назад</a>
    </div>
</div>
