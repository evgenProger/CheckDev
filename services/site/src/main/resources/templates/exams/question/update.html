<div class="row" id="manager-panel-exams" style="display: none;">
    <div class="col-md-12">
        <button class="btn btn-default pull-right" type="button">Добавить тест</button>
    </div>
</div>
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">Добавить вопрос</div>
            <div class="card-body">
                <div class="form-group">
                    <label for="usr">Название:</label>
                    <input class="form-control" id="name" ng-model="question.name" required type="text">
                </div>
                <div class="form-group">
                    <label for="usr">Порядок:</label>
                    <input class="form-control" ng-model="question.pos" required type="number">
                </div>
                <div class="form-group">
                    <label for="comment">Описание:</label>
                    <textarea class="form-control" id="description" required rows="20"></textarea>
                </div>
                <div class="form-group">
                    <label for="comment">Рекомендации:</label>
                    <textarea class="form-control" id="hint" required rows="20"></textarea>
                </div>
                <a class="btn btn-default pull-left" ng-href="#/exam/view/{{question.exam.id}}">
                    Отменить
                </a>
                <button class="btn btn-default pull-right" ng-click="save(question)">Добавить</button>
            </div>
        </div>
    </div>
</div>
