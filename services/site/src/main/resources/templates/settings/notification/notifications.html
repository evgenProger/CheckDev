<div class="row" ng-show="isAdmin">
    <div class="col-md-12">
        <a class="btn btn-secondary" href="#/notifications/template/update">Добавить шаблон</a>
        <a class="btn btn-secondary float-right" href="#/notifications/settings">Настройки</a>
    </div>
</div>
<div class="row">
    <div class="col-md-12">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>
                    <h3>Шаблоны</h3>
                </th>
                <th>Тип</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr ng-hide="template.deleted" ng-repeat="template in templates">
                <td>{{ template.subject }}</td>
                <td>{{ template.type }}</td>
                <td>
                    <a class="btn btn-link" ng-href="#/notifications/template/update/{{template.id}}">
                        <i class="fa fa-edit fa-fw"></i>
                    </a>
                    <button class="btn btn-link" ng-click="delete(template)">
                        <i class="fa fa-trash fa-fw"></i>
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
