<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                {{template.subject}} | {{ template.key }}
            </div>
            <div class="card-body">
                <textarea class="form-control" disabled rows="10">{{template.body}}</textarea>
            </div>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">Отправить</div>
            <div class="card-body">
                <div class="form-group">
                    <label for="usr">Пользователь:</label>
                    <input class="form-control" id="name" ng-model="user.id" required type="text">
                </div>
                <div class="form-group">
                    <label for="usr">Почта:</label>
                    <input class="form-control" id="name" ng-model="user.email" required type="text">
                </div>
                <a class="btn btn-secondary" ng-href="#/exam/view/{{exam.id}}">Назад</a>
                <button class="btn btn-secondary float-right" ng-click="send(user)">Отправить</button>
            </div>
        </div>
    </div>
</div>
