<div class="row" id="manager-panel-exams" style="display: none;">
    <div class="col-md-12">
        <button class="btn btn-secondary float-right" type="button">Добавить тест</button>
    </div>
</div>
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">Добавить шаблон</div>
            <div class="card-body">
                <div class="form-group">
                    <label for="usr">Заголовок:</label>
                    <input class="form-control" id="name" ng-model="template.subject" required type="text">
                </div>
                <div class="form-group">
                    <label for="usr">Тип:</label>
                    <input class="form-control" id="type" ng-model="template.type" required type="text">
                </div>
                <div class="form-group">
                    <label for="comment">Описание:</label>
                    <textarea class="form-control" id="description" ng-model="template.body" required
                              rows="10"></textarea>
                </div>
                <a class="btn btn-secondary" ng-href="#/exam/view/{{exam.id}}">Назад</a>
                <button class="btn btn-secondary float-right" ng-click="save(template)">Добавить</button>
            </div>
        </div>
    </div>
</div>
