<div class="row">
    <div class="col-md-12">
        <a class="btn btn-secondary" href="#/orders/fresh">Новые заявки</a>
        <a class="btn btn-secondary" href="#/orders">Все заявки</a>
    </div>
</div>
<div class="row p-3" ng-hide="loaded">
    <div class="col-md-6">
        <div class="float-right">
            <i class="fa fa-cog fa-spin" style="font-size:70px"></i>
        </div>
    </div>
</div>
<div class="row" ng-show="loaded">
    <div class="col-md-12">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>
                    <h3>Заявки</h3>
                </th>
                <th class="text-center">Создан</th>
                <th class="text-center">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr ng-repeat="order in orders">
                <td>
                    {{ order.username }} {{ order.email }} <br/>
                    {{ order.msg }}
                </td>
                <td class="text-center">{{ order.created | date: 'dd.MM.yyyy'}}</td>
                <td class="text-center">
                    <button class="btn btn-link" ng-click="archive(order)" ng-hide="order.archive">
                        <span class="glyphicon glyphicon-trash"></span>
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
