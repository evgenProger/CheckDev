<div class="row">
    <h2>Создать профиль пользователя.</h2>
    <div class="alert alert-danger" id="create_error" style="display: none;"></div>
    <div class="alert alert-info" ng-show="created">
        Профиль сохранен.
    </div>
    <div class="col-md-12" id="profile-form" role="form">
        <div class="card">
            <div class="card-header">
                <h4>Заполните форму.</h4></div>
            <div class="card-body">
                <div class="form-group">
                    <label for="name">ФИО:</label>
                    <input type="text" class="form-control" id="name" ng-model="person.username"
                           data-minlength="6"
                           data-error="Заполните поле" required>
                    <div class="help-block with-errors"></div>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="text" class="form-control" id="email" ng-model="person.email"
                           data-minlength="6"
                           data-error="Заполните поле" required>
                    <div class="help-block with-errors"></div>
                </div>
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" class="form-control" id="password" ng-model="person.password"
                           placeholder="Пароль"
                           data-minlength="6"
                           data-error="Заполните поле пароль" required>
                    <div class="help-block with-errors"></div>
                </div>
                <div class="form-group">
                    <label for="active">Активировать:</label>
                    <input type="checkbox" id="active" ng-model="person.active" ng-true-value="{{true}}" ng-false-value="{{false}}">
                </div>

                <a href="#" class="btn btn-secondary" onclick="document.location.href = CONTEXT + 'settings/settings.html';">
                    Назад
                </a>
                <button class="btn btn-secondary float-right" ng-click="create(person)">Сохранить</button>
            </div>
        </div>
    </div>
</div>
