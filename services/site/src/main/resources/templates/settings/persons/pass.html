<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div class="alert alert-info" ng-show="updated">
                    {{ message }}
                </div>
                <div class="form-group">
                    <label for="username">ФИО:</label>
                    <input type="text" class="form-control" id="username" ng-model="person.username" disabled>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="text" class="form-control" id="email" ng-model="person.email" disabled>
                </div>
                <div class="form-group">
                    <label for="oldPass">Прежний пароль:</label>
                    <input type="password" class="form-control" id="oldPass" ng-model="pass.password" >
                </div>

                <div class="form-group">
                    <label for="newPass">Новый пароль:</label>
                    <input type="password" class="form-control"  data-minlength="6" id="newPass" ng-model="pass.newPass" >
                </div>

                <div class="form-group">
                    <label for="newRepeat">Повторите новый пароль:</label>
                    <input type="password" class="form-control"  data-minlength="6" id="newRepeat" ng-model="pass.repeat" >
                </div>

                <a ng-href="#/persons" class="btn btn-secondary" ng-hide="id">Назад</a>
                <button class="btn btn-secondary float-right" ng-click="save(person, pass)">Сохранить</button>
            </div>
        </div>
    </div>
</div>
