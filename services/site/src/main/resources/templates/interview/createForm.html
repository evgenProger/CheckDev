<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="/img/icons/svg/check-double-solid_dark.svg">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta name="description" content="CheckDev - пробные собеседования в IT.">
    <title>interview/createForm</title>

    <!-- Required meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700,400i,900|Open+Sans:300,400,600,700,800&amp;subset=cyrillic"
          rel="stylesheet">
    <!-- Bootstrap 5.1.3 CSS -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <script th:href="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/webjars/popper.js/2.11.7/umd/popper.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.min.js}"></script>
    <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div class="row pt-3">
        <div class="cell">
            <form class="was-validated" th:action="@{/interview/create}" method="post">
                <input type="hidden" class="form-control mb-3 mt-2" id="title"
                       name="title" th:value="${category.name + ' : ' + topic.name}">
                <input type="hidden" class="form-control mb-3 mt-2" id="topicId"
                       name="topicId" th:value="${topic.id}">
                <div class="form-group">
                    <div class="mb-3">
                        <label class="fw-bold h3" for="title"
                               th:text="${category.name + ' : ' + topic.name}">Тема</label>
                    </div>
                    <!--Кнопка описание темы раскрывается по нажатию кнопки подробно-->
                    <div class="mb-3">
                        <button class="btn btn-primary m-3" type="button" data-bs-toggle="collapse"
                                data-bs-target="#collapseExample" aria-expanded="false" aria-controls="collapseExample">
                            Подробно
                        </button>
                        <div class="collapse" id="collapseExample">
                            <div class="card card-body">
                                <span th:text="${topic.text}"></span>
                            </div>
                        </div>
                    </div>
                    <!--Поле approximateDate-->
                    <div class="mb-3">
                        <label class="fw-bold" for="approximateDate">Удобное время для собеседования</label>
                        <input type="text" class="form-control" id="approximateDate"
                               name="approximateDate"
                               placeholder="Введите удобное время для собеседования" required>
                        <small class="text-muted"><span>Например, Могу в любой день после 18.00 по Москве.</span>
                        </small>
                        <div class="invalid-feedback">
                            Пожалуйста введите удобное время. Например: могу в любой день после 18.00 по Москве.
                        </div>
                    </div>
                    <!--Поля contactBy -->
                    <div class="mb-3">
                        <label class="fw-bold" for="contactBy">Связаться со мной по telegram</label>
                        <div class="input-group">
                            <span class="input-group-text" id="inputGroupPrepend3">@</span>
                            <input type="text" class="form-control" id="contactBy"
                                   name="contactBy"
                                   placeholder="Способ связи" required>
                            <div class="invalid-feedback">
                                Пожалуйста введите контакт для связи.
                            </div>
                        </div>
                    </div>
                    <!--Заполнение поля description-->
                    <div class="mb-3">
                        <label class="form-label" for="additional">Описание</label>
                        <textarea class="form-control" rows="3"
                                  id="additional"
                                  name="additional"
                                  placeholder="Введите дополнительную информацию" required></textarea>
                        <div class="invalid-feedback">
                            Пожалуйста введите описание.
                        </div>
                    </div>
                    <!--Выбор типа собеседования поел typeInterview-->
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="typeInterview" id="1" value="1">
                        <label class="form-check-label" for="1">
                            Буду проводить собеседование (задавать вопросы)
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="typeInterview" id="2" value="2" checked>
                        <label class="form-check-label" for="2">
                            Буду проходить собеседование (отвечать на вопросы)
                        </label>
                    </div>
                </div>
                <div class="form-group m-3">
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
