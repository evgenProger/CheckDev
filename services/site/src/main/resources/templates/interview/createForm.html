<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="/img/icons/svg/check-double-solid_dark.svg">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1">-->
    <meta name="description" content="CheckDev - пробные собеседования в IT.">
    <title>interview/createForm</title>

    <!-- Required meta tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700,400i,900|Open+Sans:300,400,600,700,800&amp;subset=cyrillic"
          rel="stylesheet">
    <!-- Bootstrap 5.1.3 CSS -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <script th:href="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.min.js}"></script>
    <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
</head>
<body>
<div th:insert="fragments/header :: header"></div>
<div class="container">
    <div class="row pt-3">
        <div class="col-sm">
        </div>
        <div class="col-sm">
            <form th:action="@{/interview/create}" method="post">
                <div class="form-group">
                    <p>
                    <h3><label class="fw-bold" for="title" th:text="${category.name + ' : ' + topic.name}">Тема</label>
                    </h3>
                    <input type="hidden" class="form-control mb-3 mt-2" id="title"
                           name="title" th:value="${category.name + ' : ' + topic.name}">
                    <input type="hidden" class="form-control mb-3 mt-2" id="topicId"
                           name="topicId" th:value="${topic.id}">
                    </p>
                    <p>
                        <label class="fw-bold" for="approximateDate">Удобное время для собеседования</label>
                        <input type="text" class="form-control mb-3 mt-2" id="approximateDate"
                               name="approximateDate"
                               placeholder="Введите удобное время для собеседования" required>
                    <div class="mb-3" th:if="${error}">
                        <p class="text-danger" th:text="${error}"></p>
                    </div>
                    <small class="mb-2 text-muted"><span>Например, Могу в любой день после 18.00 по Москве.</span>
                    </small>
                    </p>
                    <p>
                        <label class="fw-bold" for="contactBy">Связаться со мной по telegram</label>
                        <input type="text" class="form-control mb-3 mt-2" id="contactBy"
                               name="contactBy"
                               placeholder="Способ связи" required>
                    <div class="mb-3" th:if="${error}">
                        <p class="text-danger" th:text="${error}"></p>
                    </div>
                    </p>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="typeInterview" id="1" value="1">
                        <label class="form-check-label" for="1">
                            Буду проводить собеседование (задавать вопросы)
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="typeInterview" id="2" value="2" checked>
                        <label class="form-check-label" for="2">
                            Буду проходить собеседование (отвечать на вопросы)
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <p></p>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
        <div class="col-sm">
        </div>
    </div>
</div>
<br>
<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
