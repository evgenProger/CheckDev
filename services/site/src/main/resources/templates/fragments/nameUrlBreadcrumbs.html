<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<body>
<div th:fragment="nameUrlBreadcrumbs">
    <nav>
        <ol class="breadcrumb">
            <li th:each="breadcrumb : ${breadcrumbs}">
                <a th:href="${breadcrumb.url}" th:text="${breadcrumb.name}"></a>
            </li>
        </ol>
    </nav>
</div>
</body>
</html>
