<div th:fragment="header" xmlns:th="http://www.w3.org/1999/xhtml">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" th:href="@{/categories/}">Категории</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" th:href="@{/interviews/}">Собеседования</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/profiles/}">Профили</a>
                    </li>
                    <li class="nav-item" th:if="${userInfo == null}">
                        <a class="nav-link" th:href="@{/login}">
                            Войти
                        </a>
                    </li>
                    <li class="nav-item dropdown" th:if="${userInfo != null}">
                        <span class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown"
                              aria-expanded="false">
                            <span th:text="${userInfo.username != null} ? ${userInfo.username} : ${userInfo.email}">Login/Email пользователя</span>
                        </span>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Профиль</a></li>
                            <li><a class="dropdown-item" th:href="@{/logout}">Выйти</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Поиск" aria-label="Поиск">
                    <button class="btn btn-outline-success" type="submit">Искать</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li th:each="breadcrumb, stat : ${breadcrumbs}" class="breadcrumb-item">
                    <a th:if="${stat.last}" th:text="${breadcrumb.name}"></a>
                    <a th:unless="${stat.last}" th:href="${breadcrumb.url}" th:text="${breadcrumb.name}"></a>
                </li>
            </ol>
        </nav>
    </div>
</div>
