<div class="container p-3">
    <div class="row p-3" ng-hide="loaded">
        <div class="col-md-6">
            <div class="float-right">
                <i class="fa fa-cog fa-spin" style="font-size:70px"></i>
            </div>
        </div>
    </div>

    <div class="alert alert-info" ng-show="last">
        Вы уже прошли это интервью. Результаты.
    </div>

    <div class="row" ng-show="loaded">
        <div class="col-md-12 p-3">
            <div class="card">
                <div class="card-header">
                    <strong>{{ vacancy.name }}</strong>
                    <div class="col-md-3 float-right" ng-show="limit">
                        <h5 class="float-right">Отведенное время: {{ limit }} ч.</h5>
                    </div>
                    <br/>
                    {{ vacancy.company }}.
                    {{ vacancy.location }}.
                    <span ng-show="vacancy.rate">{{ vacancy.rate }}.</span>
                    <span ng-show="vacancy.experience">{{ vacancy.experience }}.</span>
                </div>
                <div class="card-body" data-ng-bind-html="description">
                </div>
            </div>
        </div>
    </div>
    <div class="row" ng-show="loaded">
        <div class="col-md-12 text-center" ng-hide="showIntro || last">
            <button class="btn btn-success center-block" ng-click="intro(vacancy)" ng-show="process">Продолжить
                собеседование
            </button>
            <button class="btn btn-success center-block" ng-click="intro(vacancy)" ng-hide="process">Начать
                собеседование
            </button>
        </div>

        <div class="col-md-12 text-center" ng-hide="!showIntro || last">
            <button class="btn btn-success center-block" ng-click="start(vacancy)" ng-show="process">Продолжить
                собеседование
            </button>
            <button class="btn btn-success center-block" ng-click="start(vacancy)" ng-hide="process">Начать
                собеседование
            </button>
        </div>
    </div>

</div>
