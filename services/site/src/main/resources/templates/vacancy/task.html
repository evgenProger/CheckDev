<div class="row p-3" ng-hide="loaded">
    <div class="col-md-6">
        <div class="float-right">
            <i class="fa fa-cog fa-spin" style="font-size:70px"></i>
        </div>
    </div>
</div>

<div class="alert alert-info" ng-show="error">
    Вы можете повторно пройти экзамен через день!
</div>

<div class="row" ng-show="loaded">
    <div class="col-md-12">
        <div class="progress">
            <div aria-valuemax="100" aria-valuemin="0" aria-valuenow="50"
                 class="progress-bar progress-bar-info" role="progressbar" style="width:{{percent}}%">
                {{ current }} \ {{ total }}
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="form-group" data-ng-bind-html="description"></div>
                <div class="form-group" ng-show="task.type == 'SINGLE_LINE'">
                    <label for="usr">{{task.name}}:</label>
                    <input class="form-control" ng-module="task.values[0].value" type="text">
                </div>
                <div class="form-group" ng-show="task.type == 'AREA'">
                    <label for="comment">Comment:</label>
                    <textarea class="form-control" id="comment" rows="5"></textarea>
                </div>
                <div class="form-group" ng-show="task.type == 'LIST'">
                    <label for="sel1">Select list:</label>
                    <select class="form-control" id="sel1">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                    </select>
                </div>
                <div class="form-group" ng-show="task.type == 'MULTILIST'">
                    <label for="sel2">Mutiple select list (hold shift to select more than one):</label>
                    <select class="form-control" id="sel2" multiple>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                    </select>
                </div>
                <div class="form-group" ng-show="task.type == 'DATE'">
                    <label for="usr">Name:</label>
                    <input class="form-control" id="usr" type="date">
                </div>
                <div class="form-group" ng-show="task.type == 'INT'">
                    <label for="usr">Name:</label>
                    <input class="form-control" id="usr" type="number">
                </div>
                <div class="form-group" ng-show="task.type == 'ATTACH'">
                    <label for="usr">Name:</label>
                    <input class="form-control" id="usr" type="file">
                </div>

                <div class="form-group" ng-show="task.type == 'TASK'">
                    <label for="comment">Code:</label>
                    <textarea class="form-control" id="comment" rows="5"></textarea>
                </div>

                <div class="form-group" ng-show="task.type == 'TASK'">
                    <label for="comment">Test:</label>
                    <textarea class="form-control" disabled id="comment" rows="5"></textarea>
                </div>
                <div class="form-group" ng-show="task.type == 'TASK'">
                    <button class="btn btn-secondary float-right" ng-click="start(exam)">Запустить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row" ng-show="loaded">
    <div class="col-md-12 float-right">
        <a class="btn btn-secondary" ng-href="#/load">Назад</a>
        <button class="btn btn-success float-right" ng-click="next(task)">Далее</button>
    </div>
</div>
