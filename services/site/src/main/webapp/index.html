<script>
    function tooltips() {
        $(document).ready(function () {
            $('[data-toggle="tooltip"]').tooltip({html: true});
        });
        var isVisible = false;
        var hideAllPopovers = function () {
            $('[data-toggle="popover"]').popover('hide');
        };

        $('[data-toggle="popover"]').popover({
            html: true,
            trigger: 'manual'
        }).on('click', function (e) {
            // if any other popovers are visible, hide them
            if (isVisible) {
                hideAllPopovers();
            }

            $(this).popover('show');

            // handle clicking on the popover itself
            $('.popover').off('click').on('click', function (e) {
                e.stopPropagation(); // prevent event for bubbling up => will not get caught with document.onclick
            });

            isVisible = true;
            e.stopPropagation();
        });


        $(document).on('click', function (e) {
            hideAllPopovers();
            isVisible = false;
        });
    }

    /**
     * Перевести время из млилисекунд в ЧЧ:ММ:СС
     * @param millisecond
     * @returns {string}
     */
    function toTime(limit) {
        var hh = Math.floor(limit / 1000 / 60 / 60);
        var mm = Math.floor(limit / 1000 / 60 % 60);
        var ss = Math.floor(limit / 1000 % 60 % 60);
        return hh + ':' + mm + ':' + ss;
    }

    var types = {
        SINGLE_LINE: 'Однострочное поле',
        AREA: 'Многострочное поле',
        LIST: 'Список',
        MULTILIST: 'Список со множественным выбором',
        INT: 'Число',
        DATE: 'Дата',
        ATTACH: 'Файл',
        TASK: 'Алгоритмическая задача',
        TEST: 'Тест',
        URL: 'URL'
    };
    var PREDICTS = {
        EQ: 'Равно',
        NOT_EQ: 'Не равно',
        CONTAINS: 'Содержит',
        NOT_CONTAINS: 'Не содержит',
        GREAT: 'Больше',
        LESS: 'Меньше'
    };

    var INTERVIEW_RSL = {
        PROCESS: 'В процессе',
        SUCCESS: 'Успешно прошел',
        FAIL: 'Не прошел',

    job4j.controller('CandidatesController', function ($scope, $http, $location, $route, $routeParams, $window) {

                vm.search + "/" + vm.itemsPerPage + "/" + pageno;

                    $routeParams.vacancyId + "/" + $routeParams.interviewId;
            }
            vm.candidates = [];

                function (data) {
                    $scope.loaded = true;
                    vm.candidates = data.candidates;
                    vm.total_count = data.total;
                    $scope.details = data.vacancy;
                },
                function (data) {

                    rsl = list[i].value;
                    break;
                }
            }
            return rsl;

            vm.getData(vm.pageno);

    job4j.controller('InterviewNextController', function ($scope, $http, $location, $route, $sce, $routeParams) {
        $scope.CONTEXT = CONTEXT;
        $scope.running = false;
        $scope.itask = {
            values: [{}]
        };
        $scope.invalid = false;
        $scope.interviewId = $routeParams.interviewId;
        doGet($http, INTERVIEW_URL + "/interview/interview/next/" + $routeParams.interviewId, function (data) {
            $scope.exam = data.exam;
            $scope.algo = data.algo;
            $scope.last = data.last;
            $scope.loaded = true;
            $scope.current = parseInt(data.passed) + 1;
            if (data.limit) {
                $scope.limit = toTime(data.limit);
                seconds = data.limit / 1000;
                tiktak();
            }
            var track = data.track;
            if (track == null) {
                $scope.description = $sce.trustAsHtml(data.vacancy.congratulate);
                $scope.last =true;
            }else {
                if (data.last) {
                    if (data.interview.result === 'FAIL') {
                        $scope.last = true;
                        $scope.description = $sce.trustAsHtml(data.vacancy.failure);
                    } else {
                        $scope.description = $sce.trustAsHtml(data.vacancy.congratulate);
                    }
                } else {
                    $scope.trackId = track.id;
                    $scope.total = data.all;
                    $scope.percent = ($scope.current / $scope.total) * 100;
                    $scope.task = track.task;
                    if (track.task.type === "MULTILIST") {
                        $scope.itask.values.splice(0, 1);
                        for (var index = 0; index !== track.task.values.length; index++) {
                            $scope.itask.values.push({});
                        }
                    }
                    $scope.attach = track.task.type === "ATTACH";
                    $scope.description = $sce.trustAsHtml(track.task.description);
                }
            }
            $scope.$watch('itask', function () {
                if ($scope.task) {
                    if ($scope.task.type === "MULTILIST") {
                        for (var index = 0; index !== $scope.itask.values.length; index++) {
                            if ($scope.itask.values[index].value) {
                                $scope.invalid = true;
                                break;
                            } else {
                                $scope.invalid = false;
                            }
                        }
                    } else if ($scope.task.type === "TEST" && $scope.exam && $scope.exam.finish) {
                        $scope.invalid = true
                    } else {
                        if ($scope.itask.values[0].value) {
                            $scope.invalid = true;
                        } else {
                            $scope.invalid = false;
                        }
                    }
                } else {
                    $scope.invalid = true;
                }
            }, true);
            if (data.algo) {
                $scope.itask.values[0].value = data.algo.source;
                $scope.description = $sce.trustAsHtml(data.algo.description);
            }
        });

        $scope.uploadFile = function (files) {
            $scope.files = files;
            angular.element(document.getElementById('next'))[0].disabled = false;
        };

        $scope.vacancies = function () {
            $location.path("/vacancies");
        };


        $scope.next = function (itask, type) {
            if ($scope.attach) {
                var fd = new FormData();
                fd.append("file", $scope.files[0]);
                $http.post(INTERVIEW_URL + "/interview/interview/upload/" + $scope.trackId, fd, {
                    transformRequest: angular.identity,
                    headers: {
                        'Content-Type': undefined,
                        'Authorization': 'Bearer ' + readCookie("token")
                    }
                }).success(function () {
                    $route.reload();
                }).error(function (response) {
                    console.log("file upload error " + response);
                });
            } else {
                if (type === 'DATE') {
                    itask.values[0].value = new Date(itask.values[0].value).getTime();
                }
                doPost($http, INTERVIEW_URL + "/interview/interview/save/" + $scope.trackId, itask,
                    function (data) {
                        $route.reload();
                    }
                );
            }
        };

        $scope.run = function (itask) {
            var algo = {
                sname: $scope.algo.sname,
                tname: $scope.algo.tname,
                source: itask.values[0].value,
                test: $scope.algo.test
            }
            $scope.running = true;
            $http({
                method: 'POST',
                url: INTERVIEW_URL + "/interview/algo/run",
                data: algo,
                headers: {
                    'Authorization': 'Bearer ' + readCookie("token"),
                    'Content-Type': 'application/json'
                },
            }).then(function successCallback(response) {
                $scope.running = false;
                $scope.result = true;
                $scope.log = response.data;
            }, function errorCallback(response) {
                console.log(response);
            });
        }
    });
    var seconds = 0;
    function tiktak() {
        if (seconds > 0) {
            seconds--;
            var h = seconds / 3600 ^ 0,
                m = (seconds - h * 3600) / 60 ^ 0,
                s = seconds - h * 3600 - m * 60,
                time = (h < 10 ? "0" + h : h) + ":" + (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s.toFixed(0) : s.toFixed(0));
        }
        if (seconds < 0) {
            time = 'Время вышло.';
        }
        if(document.getElementById){timer.innerHTML=time;}
        setTimeout("tiktak()", 1000);
    }

    job4j.controller('VacanciesOwnerController', function ($scope, $http, $location, $route, $routeParams, $window) {
        tooltips();
        doAction($http,
            function () {
                $('#showAll').show();
            },
            function() {
                $('#showAll').hide();
            },
            function(response) {
                console.log(response);
            },
            'ROLE_ADMIN', undefined
        );

        var vm = this;
        vm.pageno = 0;
        vm.itemsPerPage = 10;
        vm.all = false;
        vm.getData = function (pageno) {
            if (!vm.all) {
                var url = INTERVIEW_URL + "/interview/vacancy/" + vm.itemsPerPage + "/" + pageno;
                doGet($http, url,
                    function (data) {
                        var vacancy = data.vacancyDetails;
                        $scope.loaded = true;
                        $.each(vacancy, function(index, vacancy) {
                            checkVacancyValid(vacancy.vacancy, vacancy.vacancy.id);
                        });
                        $scope.vacancies = vacancy;
                        vm.total_count = data.total;
                    },
                    function (data) {
                        $window.location.href =
                            'login.html?redirectUri=index.html#/owner';
                    }
                );
            } else {
                var url2 = INTERVIEW_URL + "/interview/vacancy/all/" + vm.itemsPerPage + "/" + pageno;
                doGet($http, url2,
                    function (data) {
                        var vacancy = data.vacancyDetails;
                        $.each(vacancy, function(index, vacancy) {
                            checkVacancyValid(vacancy.vacancy, vacancy.vacancy.id);
                        });
                        $scope.vacancies = vacancy;
                        vm.total_count = data.total;
                    },
                    function (data) {
                        $window.location.href =
                            'login.html?redirectUri=index.html#/owner';
                    });
            }
        };
        vm.getData(vm.pageno);
        $scope.data = vm;
        function checkVacancyValid(vacancy, id) {
            doGet($http, INTERVIEW_URL + "/interview/vacancy/detail/" + id, function (data) {
                vacancy.valid = data.tasks.length > 0;
            })
        }

        $scope.predictLbl = function (key) {
            return PREDICTS[key];
        };

        $scope.activeVacancy = function (vacancy, active) {

            vacancy.congratulate = $("#congratulate").val();
            vacancy.failure = $("#failure").val();
            vacancy.experience = $('#experience').val();
            doPost($http, INTERVIEW_URL + "/interview/vacancy/", vacancy,
                function (data) {
                    $location.path("/vacancy/" + data.id);
                },
                function errorCallback(response) {
                    console.log(response);
                }
            );
        };
        $scope.load = function (link) {
            if (link !== undefined && link !=='') {
                var id = link.substr(link.lastIndexOf("/") + 1, link.length);
                if (id.indexOf("?") !== -1) {
                    id = id.substr(0, id.indexOf("?"));
                }
                $http.get('https://api.hh.ru/vacancies/' + id)
                    .success(function (data) {
                        $('#name').val(data.name);
                        $('#company').val(data.employer.name);
                        $('#location').val(address(data.address));
                        $('#rate').val(rate(data.salary));
                        $('#experience').val(data.experience.name);
                        $('#description').val(data.description);
                        document.getElementsByClassName('note-editable')[0].innerHTML = data.description;
                    })

            } else {
                $scope.message = "Введите корректный URL"
            }
        };
        function isEmptyOrSpaces(str){
            return str === null || str.match(/^ *$/) !== null;
        }
        function rate(data) {
            var rate = 'не указана';
            if (data !== null) {
                console.log(data.to + ' ' + data.from);
                if ((data.from !== null) && (data.to !== null)) {
                    rate = 'от ' + data.from + ' до ' + data.to +' ' + data.currency;
                } else if (data.from !== null) {
                    rate = 'от ' + data.from + ' ' + data.currency;
                } else if (data.to !== null) {
                   rate =  'до ' + data.to + ' ' + data.currency;
                }
            }
            return rate;
        }
        function address(data) {
            var address = '';
            if (data !== null) {
               if (!isEmptyOrSpaces(data.city)) {
                   address = data.city;
               }
               if (!isEmptyOrSpaces(data.street)) {
                    address = address + ' ' + data.street;
                }
                if (!isEmptyOrSpaces(data.building)) {
                    address = address + ' ' + data.building;
                }
            }
            return address;
        }
    });

            values: [{}]
        };

            filters: [{}]
        };

        $scope.addNewChoice = function () {
            var newItemNo = $scope.task.values.length + 1;
            $scope.task.values.push({});
        };

        $scope.removeChoice = function (index) {
            $scope.task.values.splice(index, 1);
            if ($scope.task.values.length === 0) {
                $scope.task.values.push({});
            }
        };

        $scope.updateForm = function () {
            if ($scope.task.type === 'LIST' || $scope.task.type === 'MULTILIST'|| $scope.task.type === 'URL'
                || $scope.task.type === 'SINGLE_LINE' || $scope.task.type === 'AREA' || $scope.task.type === 'INT'
                || $scope.task.type === 'DATE' || $scope.task.type === 'ATTACH' || $scope.task.type === 'TEST') {
                document.getElementById("name").removeAttribute("disabled", false);
                document.getElementsByClassName('note-editable')[0].setAttribute('contenteditable','true');

            }
            if ($scope.task.type === 'LIST' || $scope.task.type === 'MULTILIST'|| $scope.task.type === 'URL') {
                $scope.task.values = [{}];
            } else if ($scope.task.type === 'TASK') {
                $scope.task.values = [{}];
                $scope.loadedAlgo = false;
                doGet($http, INTERVIEW_URL + "/interview/algo/published", function (data) {
                    $scope.loadedAlgo = true;
                    $scope.algos = data;
                });
            } else if ($scope.task.type === 'TEST') {
                $scope.task.values = [{}];
                $scope.loadedExam = false;
                doGet($http, EXAM_URL + "/exams/answers/active", function (data) {
                    $scope.loadedExam = true;
                    $scope.exams = data.exams;
                });
            }
        };

        $scope.updateFilters = function () {
            $scope.task.filters = [{}];
        };

        $scope.addFilter = function () {
            var newItemNo = $scope.task.filters.length + 1;
            $scope.task.filters.push({});
        };

        $scope.removeFilter = function (index) {
            $scope.task.filters.splice(index, 1);
            if ($scope.task.filters.length === 0) {
                $scope.task.filters.push({});
            }
        };

        if ($routeParams.id) {
            doGet($http, INTERVIEW_URL + "/interview/task/" + $routeParams.id, function (data) {
                $scope.loaded = true;
                $scope.task = data;
                if ($scope.task.values.length < 1) {
                    $scope.task.values = [{}];
                }
                if ($scope.task.filters.length < 1) {
                    $scope.task.filters = [{}];
                }
                $('#description').val(data.description);
                $('#description').summernote({height: 300});
                if ($scope.task.type === 'TASK' || $scope.task.type === 'TEST') {
                    $scope.updateForm();
                }
            });
        } else {
            $scope.loaded = true;
            $scope.task.type = 'AREA';
            $('#description').summernote({height: 300});
        }

        $scope.addInfo = function (algo) {
            $('#name').val(algo.name);
            document.getElementById('name').setAttribute('disabled','true');
            $scope.desc = algo.description;
            $scope.task.values[0].info = algo.name;
            document.getElementsByClassName('note-editable')[0].innerHTML = '';
            document.getElementsByClassName('note-editable')[0].innerHTML = algo.description;
            $('#description').summernote('disable');
            document.getElementsByClassName('note-editable')[0].setAttribute('contenteditable','false');
        };

        $scope.save = function (task) {
            var size = task.filters.length;
            for (var i = 0; i !== size; i++) {
                if (task.type === 'DATE') {
                    task.filters[i].value = new Date(task.filters[i].value).getTime();
                }
            }
            task.vacancy = {id: $routeParams.vacancyId};
            task.description = $("#description").val();
            console.log($('#name').val());
            task.name = $('#name').val();
            if ($routeParams.id) {
                doPut($http, INTERVIEW_URL + "/interview/task/", task, function (data) {
                    $location.path("/vacancy/" + $routeParams.vacancyId);
                });
            } else {
                doPost($http, INTERVIEW_URL + "/interview/task/", task, function (data) {
                    $location.path("/vacancy/" + $routeParams.vacancyId);
                });
            }
        }
    });

                        'login.html?redirectUri=index.html#/invited/cv/' + $routeParams.key;
                }
            );
        };


        vm.getData(vm.pageno);
        $scope.data = vm;
        function checkVacancyValid(vacancy, id) {
            doGet($http, INTERVIEW_URL + "/interview/vacancy/detail/" + id, function (data) {
                vacancy.valid = false;
            })
        }
        $scope.sendInvitation = function (data) {
            var url =  INTERVIEW_URL + "/interview/interview/sendInvite/"+ data;
            doPost($http, url, $scope.person,
                function (data) {
                    console.log(data);
                    {
                        location.reload();
                    }

                },
                function errorCallback(response) {
                    console.log(response);
                }

            );
        };

        $scope.predictLbl = function (key) {
            return PREDICTS[key];
        };

        $scope.activeVacancy = function (vacancy, active) {
            vacancy.active = active;
            doPost($http, INTERVIEW_URL + "/interview/vacancy/", vacancy,
                function (data) {
                    vacancy.published = data.published;
                },
                function errorCallback(response) {
                    console.log(response);
                }
            );
        };
        $scope.archiveVacancy = function (vacancy, archive) {
            vacancy.archive = archive;
            vacancy.active = false;
            doPost($http, INTERVIEW_URL + "/interview/vacancy/", vacancy,
                function (data) {
                    $route.reload();
                },
                function errorCallback(response) {
                    console.log(response);
                }
            );
        };

        $scope.showAll = function () {
            vm.all = true;
            vm.pageno = 0;
            vm.getData(vm.pageno);
            $scope.author = true;
        }
    });
</script>
</body>
</html>
