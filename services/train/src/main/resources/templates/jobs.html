<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">

    <title>Job4j CI</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <link th:href="@{/webjars/bootstrap/3.3.4/css/bootstrap.min.css}"
          rel="stylesheet" media="screen" />

    <script th:src="@{/webjars/jquery/2.1.4/jquery.min.js}"></script>
</head>
<body>
<div class="container">
    <div th:replace="frags/header :: header"></div>
    <h2>
        <a th:href="@{/projects/}" class="btn btn-secondary">Список проектов</a>
        <a th:href="@{/jobs/update}" class="btn btn-secondary float-right">Добавить новую работу</a>
    </h2>
    <table class="table">
        <thead>
        <tr>
            <th>Имя</th>
            <th>Задачи</th>
            <th>Cron</th>
            <th>Дейсвия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="job: ${jobs}">
            <td th:text="${job.name}"></td>
            <td>
                <table class="table" th:if="!${#lists.isEmpty(job.tasks)}">
                    <thead>
                    <tr>
                        <th>Имя</th>
                        <th>Порядок</th>
                        <th>Тип</th>
                        <th>Команды</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="task : ${job.tasks}">
                        <td th:text="${task.name}"></td>
                        <td th:text="${task.pos}"></td>
                        <td th:text="${task.type}"></td>
                        <td th:text="${task.command}"></td>
                        <td>
                            <a th:href="@{'/tasks/add/' + ${job.id} + '?id=' + ${task.id}}">
                                <span class="glyphicon glyphicon-pencil"></span>
                            </a>
                            <a th:href="@{'/tasks/delete?id=' + ${task.id}}">
                                <span class="glyphicon glyphicon-trash"></span>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </td>
            <td th:text="${job.cron}"></td>
            <td>
                <a th:href="@{'/tasks/add/' + ${job.id}}"><span class="glyphicon glyphicon-plus"></span></a>
                <a href="#">
                    <a th:href="@{'/jobs/update/?id=' + ${job.id}}"><span class="glyphicon glyphicon-pencil"></span></a>
                </a>
                <a th:href="@{'/jobs/delete?id=' + ${job.id}}">
                    <span class="glyphicon glyphicon-trash"></span>
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
