<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">

    <title>Job4j CI</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <link th:href="@{/webjars/bootstrap/3.3.4/css/bootstrap.min.css}"
          rel="stylesheet" media="screen" />

    <script th:src="@{/webjars/jquery/2.1.4/jquery.min.js}"></script>
</head>
<body>
<div class="container">
    <h2>
        <a th:href="@{/settings/}" class="btn btn-secondary">Настройки</a>
    </h2>

    <form th:action="@{/settings/save}" method="post" th:object="${setting}">
        <input type="hidden" name="id" th:value="*{id}"/>
        <div class="form-group">
            <label for="name">Имя:</label>
            <input type="text" th:if="*{type.name() != 'GIT_PWD'}" th:value="*{value}" name="value" class="form-control" id="name"/>
            <input type="password" th:if="*{type.name() == 'GIT_PWD'}" th:value="*{value}" name="value" class="form-control" id="name"/>
        </div>
        <div class="form-group">
            <label for="type">Тип:</label>
            <select class="form-control" id="type" name="type" th:field="*{type}">
                <option th:each="type: ${types}" th:value="${type}" th:text="${type}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-secondary">Сохранить</button>
    </form>
</div>
</body>
</html>
