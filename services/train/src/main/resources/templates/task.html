<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">

    <title>Job4j CI</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <link th:href="@{/webjars/bootstrap/3.3.4/css/bootstrap.min.css}"
          rel="stylesheet" media="screen" />

    <script th:src="@{/webjars/jquery/2.1.4/jquery.min.js}"></script>
</head>
<body>
<div class="container">
    <h2>
        <a th:href="@{/jobs/}" class="btn btn-secondary">Список работ</a>
    </h2>

    <form th:action="@{/tasks/save}" method="post" th:object="${task}">
        <input type="hidden" name="job.id" th:value="${jobId}"/>
        <input type="hidden" name="id" th:value="*{id}"/>
        <div class="form-group">
            <label for="name">Имя:</label>
            <input type="text" th:value="*{name}" name="name" class="form-control" id="name"/>
        </div>
        <div class="form-group">
            <label for="pos">Порядок:</label>
            <input type="text" th:value="*{pos}" name="pos" class="form-control" id="pos"/>
        </div>
        <div class="form-group">
            <label for="type">Тип:</label>
            <select class="form-control" id="type" name="type" th:field="*{type}">
                <option th:each="type: ${types}" th:value="${type}" th:text="${type}"></option>
            </select>
        </div>
        <div class="form-group">
            <label for="command">Команды:</label>
            <textarea class="form-control" rows="5" id="command" name="command" th:field="*{command}"></textarea>
        </div>
        <button type="submit" class="btn btn-secondary">Сохранить</button>
    </form>
</div>
</body>
</html>
