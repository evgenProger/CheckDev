<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">

    <title>Job4j CI</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>

    <link th:href="@{/webjars/bootstrap/3.3.4/css/bootstrap.min.css}"
          rel="stylesheet" media="screen" />

    <script th:src="@{/webjars/jquery/2.1.4/jquery.min.js}"></script>
</head>
<body>
<div class="container">
    <h2>
        <a th:href="@{/jobs/}" class="btn btn-secondary">Список работ</a>
    </h2>
    <form th:action="@{/jobs/save}" method="post" th:object="${job}">
        <input type="hidden" name="id" th:value="*{id}"/>
        <div class="form-group">
            <label for="name">Имя:</label>
            <input type="text" name="name" class="form-control" id="name" th:value="*{name}"/>
        </div>
        <div class="form-group">
            <label for="cron">Cron:</label>
            <input type="text" name="cron" class="form-control" id="cron" th:value="*{cron}"/>
        </div>
        <button type="submit" class="btn btn-secondary">Добавить</button>
    </form>
</div>
</body>
</html>
